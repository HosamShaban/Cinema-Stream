{% extends 'index.html' %}
{% load static %}
{% block title %}Login & Register{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row">
    <div class="col-md-6">
      <h3>Login</h3>
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control">
        </div>
        <button class="btn btn-primary">Login</button>
      </form>
    </div>
    <div class="col-md-6">
      <h3>Register</h3>
      <form method="post" action="{% url 'register' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">
          <div class="col"><input name="first_name" class="form-control mb-2" placeholder="First name" required></div>
          <div class="col"><input name="last_name" class="form-control mb-2" placeholder="Last name" required></div>
        </div>
        <div class="mb-2"><input name="email" class="form-control" placeholder="Email" required></div>
        <div class="mb-2"><input name="date_of_birth" type="date" class="form-control" required></div>
        <div class="mb-2"><input name="password" type="password" class="form-control" placeholder="Password" required></div>
        <div class="mb-2"><input name="confirm_password" type="password" class="form-control" placeholder="Confirm password" required></div>
        <div class="mb-2"><input name="avatar" type="file" class="form-control"></div>
        <button class="btn btn-success">Register</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
