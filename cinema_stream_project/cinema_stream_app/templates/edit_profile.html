{% extends 'index.html' %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="container py-4">
  <h3>Edit Profile</h3>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">First Name</label>
      <input type="text" name="first_name" class="form-control" value="{{ profile.user.first_name }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Last Name</label>
      <input type="text" name="last_name" class="form-control" value="{{ profile.user.last_name }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ profile.user.email }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Avatar</label>
      <input type="file" name="avatar" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
