{% extends 'index.html' %}
{% block content %}
<div class="container py-5">
    <h1>Browse Movies & Series</h1>
    <form id="search-form" class="d-flex mb-4">
        <input class="form-control me-2" name="q" placeholder="Search..." value="{{ query }}">
        <button class="btn btn-danger">Search</button>
    </form>

    <div class="row">
        <div class="col-md-3">
            <h5>Filters</h5>
            <form id="filter-form">
                <div class="mb-3">
                    <label>Genre</label>
                    <select name="genre" class="form-select">
                        <option value="">All</option>
                        {% for g in genres %}
                        <option value="{{ g.slug }}" {% if g.slug == current_genre %}selected{% endif %}>{{ g.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label>Year</label>
                    <input type="number" name="year" class="form-control" value="{{ current_year }}">
                </div>
                <div class="mb-3">
                    <label>Type</label><br>
                    <input type="radio" name="type" value="movie" {% if current_type != 'series' %}checked{% endif %}> Movie
                    <input type="radio" name="type" value="series" {% if current_type == 'series' %}checked{% endif %}> Series
                </div>
                <button type="submit" class="btn btn-danger w-100">Apply Filters</button>
            </form>
        </div>

        <div class="col-md-9">
            <div class="row row-cols-2 row-cols-md-4 g-4" id="results">
                {% include 'partials/movie_grid.html' %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('filter-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = new FormData(this);
    const params = new URLSearchParams(data).toString();
    fetch("{% url 'browse' %}?" + params)
        .then(r => r.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.getElementById('results').innerHTML = doc.getElementById('results').innerHTML;
        });
});
</script>
{% endblock %}
